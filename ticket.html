<script>
    // Funkcja wywołana po załadowaniu strony
    window.addEventListener('DOMContentLoaded', () => {
        // Pobieramy aktualny czas
        const now = new Date();

        // Odejmujemy 6 minut
        now.setMinutes(now.getMinutes() - 6);

        // Formatujemy datę i godzinę w czytelny sposób, np. "DD.MM.YYYY HH:MM"
        const day = String(now.getDate()).padStart(2, '0');
        const month = String(now.getMonth() + 1).padStart(2, '0'); // miesiące liczone od 0
        const year = now.getFullYear();

        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');

        const formatted = `${day}.${month}.${year}r. ${hours}:${minutes}:47`;

        // Podmieniamy zawartość elementu
        document.querySelector('.date').textContent = formatted;
    });

const inputs = document.querySelectorAll(".pin");
const overlay = document.getElementById("startupOverlay");
const vehicleNumber = document.getElementById("vehicleNumber");

inputs[0].focus();

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }

        if ([...inputs].every(i => i.value.length === 1)) {
            const number = Number([...inputs].map(i => i.value).join(""));
            vehicleNumber.textContent = number;
            overlay.style.display = "none";
        }
    });

    input.addEventListener("keydown", e => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});
</script>
